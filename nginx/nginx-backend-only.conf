events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name api.hydro-flow.io;
        return 301 https://$host$request_uri;
    }

    # Production API
    server {
        listen 443 ssl;
        http2 on;
        server_name api.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support
        location /ws {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # Temporary placeholder for main domain (until frontend is ready)
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        http2 on;
        server_name hydro-flow.io www.hydro-flow.io staging.hydro-flow.io api-staging.hydro-flow.io _;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            return 200 "HydroFlow - Coming Soon\nAPI: https://api.hydro-flow.io/health\n";
            add_header Content-Type text/plain;
        }
    }
}
