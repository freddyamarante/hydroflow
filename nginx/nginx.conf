events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name hydro-flow.io www.hydro-flow.io api.hydro-flow.io staging.hydro-flow.io api-staging.hydro-flow.io;
        return 301 https://$host$request_uri;
    }

    # Production Frontend
    server {
        listen 443 ssl;
        http2 on;
        server_name hydro-flow.io www.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            proxy_pass http://frontend-prod:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Production API
    server {
        listen 443 ssl;
        http2 on;
        server_name api.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            proxy_pass http://backend-prod:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support
        location /api/ws {
            proxy_pass http://backend-prod:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }

    # Staging Frontend
    server {
        listen 443 ssl;
        http2 on;
        server_name staging.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            proxy_pass http://frontend-staging:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Staging API
    server {
        listen 443 ssl;
        http2 on;
        server_name api-staging.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            proxy_pass http://backend-staging:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support
        location /api/ws {
            proxy_pass http://backend-staging:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }
}
