events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Docker internal DNS — resolve upstreams dynamically so nginx
    # starts/reloads even when some containers are not running.
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name hydro-flow.io www.hydro-flow.io api.hydro-flow.io staging.hydro-flow.io api-staging.hydro-flow.io demo.hydro-flow.io api-demo.hydro-flow.io;
        return 301 https://$host$request_uri;
    }

    # Production Frontend
    server {
        listen 443 ssl;
        http2 on;
        server_name hydro-flow.io www.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            set $upstream_frontend_prod frontend-prod;
            proxy_pass http://$upstream_frontend_prod:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Production API
    server {
        listen 443 ssl;
        http2 on;
        server_name api.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            set $upstream_backend_prod backend-prod;
            proxy_pass http://$upstream_backend_prod:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support
        location /api/ws {
            set $upstream_backend_prod_ws backend-prod;
            proxy_pass http://$upstream_backend_prod_ws:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }

    # Staging Frontend
    server {
        listen 443 ssl;
        http2 on;
        server_name staging.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            set $upstream_frontend_staging frontend-staging;
            proxy_pass http://$upstream_frontend_staging:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Staging API
    server {
        listen 443 ssl;
        http2 on;
        server_name api-staging.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            set $upstream_backend_staging backend-staging;
            proxy_pass http://$upstream_backend_staging:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support
        location /api/ws {
            set $upstream_backend_staging_ws backend-staging;
            proxy_pass http://$upstream_backend_staging_ws:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }

    # Demo Frontend
    server {
        listen 443 ssl;
        http2 on;
        server_name demo.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            set $upstream_frontend_demo frontend-demo;
            proxy_pass http://$upstream_frontend_demo:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Demo API
    server {
        listen 443 ssl;
        http2 on;
        server_name api-demo.hydro-flow.io;

        ssl_certificate /etc/letsencrypt/live/hydro-flow.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hydro-flow.io/privkey.pem;

        location / {
            set $upstream_backend_demo backend-demo;
            proxy_pass http://$upstream_backend_demo:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support
        location /api/ws {
            set $upstream_backend_demo_ws backend-demo;
            proxy_pass http://$upstream_backend_demo_ws:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }
}
