# HydroFlow Mosquitto - Production / Staging
# Authentication required — anonymous connections are rejected.
#
# Generate the password file on the server:
#   docker exec hydroflow-mqtt-prod mosquitto_passwd -c /mosquitto/config/passwd <username>
#
# Or create it locally and copy into the container volume:
#   mosquitto_passwd -c mosquitto/config/passwd hydroflow
#   docker cp mosquitto/config/passwd hydroflow-mqtt-prod:/mosquitto/config/passwd

listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
