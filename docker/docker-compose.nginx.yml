# Standalone Nginx Reverse Proxy
# Independent of staging/prod — stopping either environment does not affect routing.
# Requires external network: docker network create hydroflow-proxy

services:
  nginx:
    image: nginx:alpine
    container_name: hydroflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - hydroflow-proxy

networks:
  hydroflow-proxy:
    external: true
