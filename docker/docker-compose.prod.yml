version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: hydroflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - hydroflow
    depends_on:
      - backend-prod
      - frontend-prod

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hydroflow-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ../mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    networks:
      - hydroflow

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: hydroflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hydroflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hydroflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hydroflow

  redis:
    image: redis:7-alpine
    container_name: hydroflow-cache
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - hydroflow

  backend-prod:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hydroflow-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hydroflow:${DB_PASSWORD}@postgres:5432/hydroflow
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - postgres
      - redis
      - mosquitto
    networks:
      - hydroflow

  frontend-prod:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: hydroflow-web-prod
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.hydro-flow.io
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - backend-prod
    networks:
      - hydroflow

  backend-staging:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hydroflow-api-staging
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      DATABASE_URL: postgresql://hydroflow:${DB_PASSWORD}@postgres:5432/hydroflow_staging
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      JWT_SECRET: ${JWT_SECRET_STAGING}
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      - postgres
      - redis
      - mosquitto
    networks:
      - hydroflow

  frontend-staging:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: hydroflow-web-staging
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api-staging.hydro-flow.io
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      - backend-staging
    networks:
      - hydroflow

networks:
  hydroflow:
    driver: bridge

volumes:
  mosquitto_data:
  postgres_data:
  redis_data:
