# Production Environment
# Requires external network: docker network create hydroflow-proxy

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: hydroflow-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: hydroflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hydroflow
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hydroflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydroflow-prod

  redis:
    image: redis:7-alpine
    container_name: hydroflow-cache-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hydroflow-prod

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: hydroflow-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hydroflow:${DB_PASSWORD}@postgres:5432/hydroflow
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://178.156.236.104:1883
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      hydroflow-prod:
      hydroflow-proxy:
        aliases:
          - backend-prod

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.hydro-flow.io
    container_name: hydroflow-frontend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      - backend
    networks:
      hydroflow-prod:
      hydroflow-proxy:
        aliases:
          - frontend-prod

networks:
  hydroflow-prod:
    driver: bridge
  hydroflow-proxy:
    external: true

volumes:
  postgres_data:
  redis_data:
