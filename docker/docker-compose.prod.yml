# Production Environment (deployed via GitHub Actions)
version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: hydroflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hydroflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hydroflow
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hydroflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydroflow

  redis:
    image: redis:7-alpine
    container_name: hydroflow-cache
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hydroflow

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hydroflow-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hydroflow:${DB_PASSWORD}@postgres:5432/hydroflow
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://178.156.236.104:1883
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hydroflow

  nginx:
    image: nginx:alpine
    container_name: hydroflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx-backend-only.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - hydroflow
    depends_on:
      - backend

networks:
  hydroflow:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
