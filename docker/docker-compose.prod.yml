version: '3.8'

services:
  mosquitto:
    container_name: hydroflow-mqtt-prod
    ports:
      - "1883:1883"
      - "9001:9001"

  postgres:
    container_name: hydroflow-db-prod
    environment:
      POSTGRES_USER: hydroflow
      POSTGRES_PASSWORD: ${DB_PASSWORD_PROD}
      POSTGRES_DB: hydroflow
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    container_name: hydroflow-cache-prod
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    container_name: hydroflow-api-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hydroflow:${DB_PASSWORD_PROD}@postgres:5432/hydroflow
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      JWT_SECRET: ${JWT_SECRET_PROD}
    ports:
      - "127.0.0.1:3000:3000"

  frontend:
    container_name: hydroflow-web-prod
    environment:
      NEXT_PUBLIC_API_URL: https://api.hydroflow.io
    ports:
      - "127.0.0.1:3001:3000"

  nginx:
    container_name: hydroflow-proxy-prod
