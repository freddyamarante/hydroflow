# Staging Environment
# Requires external network: docker network create hydroflow-proxy

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: hydroflow-db-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: hydroflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hydroflow_staging
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hydroflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydroflow-staging

  redis:
    image: redis:7-alpine
    container_name: hydroflow-cache-staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redis_data_staging:/data
    networks:
      - hydroflow-staging

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: hydroflow-api-staging
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      DATABASE_URL: postgresql://hydroflow:${DB_PASSWORD}@postgres:5432/hydroflow_staging
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://178.156.236.104:1883
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      hydroflow-staging:
      hydroflow-proxy:
        aliases:
          - backend-staging

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api-staging.hydro-flow.io
    container_name: hydroflow-frontend-staging
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      - backend
    networks:
      hydroflow-staging:
      hydroflow-proxy:
        aliases:
          - frontend-staging

  mqtt-mock:
    build:
      context: ..
      dockerfile: scripts/Dockerfile
    container_name: hydroflow-mqtt-mock-staging
    restart: unless-stopped
    environment:
      MQTT_BROKER_URL: mqtt://178.156.236.104:1883
      DATABASE_URL: postgresql://hydroflow:${DB_PASSWORD}@postgres:5432/hydroflow_staging
      MOCK_INTERVAL_MS: "60000"
      MOCK_RETENTION_HOURS: "24"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hydroflow-staging

networks:
  hydroflow-staging:
    driver: bridge
  hydroflow-proxy:
    external: true

volumes:
  postgres_data_staging:
  redis_data_staging:
