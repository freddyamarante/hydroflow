# Local Development Environment
# Run backend outside Docker with `bun dev` for hot reload
version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: hydroflow-db-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: hydroflow
      POSTGRES_PASSWORD: cygCu5-nymtuh-qirwyv
      POSTGRES_DB: hydroflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hydroflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydroflow-local

  redis:
    image: redis:7-alpine
    container_name: hydroflow-cache-local
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hydroflow-local

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hydroflow-mqtt-local
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ../mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    networks:
      - hydroflow-local

networks:
  hydroflow-local:
    driver: bridge

volumes:
  mosquitto_data:
  postgres_data:
  redis_data:
