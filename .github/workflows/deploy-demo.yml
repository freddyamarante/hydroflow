# .github/workflows/deploy-demo.yml
name: Deploy to Demo

on:
  push:
    branches:
      - demo
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Wait for server to be ready
        run: |
          for i in 1 2 3 4 5; do
            nc -z -w 5 ${{ secrets.SERVER_HOST }} 22 && echo "SSH port open" && exit 0
            echo "Attempt $i: SSH port not ready, waiting 30s..."
            sleep 30
          done
          echo "SSH port not reachable after 5 attempts"
          exit 1

      - name: Deploy to Demo
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            # Free disk space before anything else
            docker system prune -af
            docker builder prune -af

            cd /opt/hydroflow/hydroflow

            # Pull latest code (reset local changes from manual edits)
            git fetch origin demo
            git checkout demo
            git reset --hard origin/demo

            # Ensure shared proxy network exists
            docker network create hydroflow-proxy 2>/dev/null || true

            # Build demo services (fail on build error)
            docker compose -p hydroflow-demo -f docker/docker-compose.demo.yml --env-file /opt/hydroflow/.env.demo build || { echo "Build failed"; exit 1; }

            # Deploy — old containers exiting with 137 is expected
            docker compose -p hydroflow-demo -f docker/docker-compose.demo.yml --env-file /opt/hydroflow/.env.demo up -d

            # Wait for backend container to be running (it may restart a few times)
            echo "Waiting for backend container to be running..."
            for i in $(seq 1 30); do
              STATE=$(docker inspect --format '{{.State.Status}}' hydroflow-api-demo 2>/dev/null || echo "missing")
              if [ "$STATE" = "running" ]; then
                echo "Backend container is running (attempt $i)"
                sleep 2
                break
              fi
              echo "  Attempt $i: backend is $STATE, waiting..."
              sleep 3
            done

            # If backend is still not running, dump logs and fail
            STATE=$(docker inspect --format '{{.State.Status}}' hydroflow-api-demo 2>/dev/null || echo "missing")
            if [ "$STATE" != "running" ]; then
              echo "Backend container is $STATE — dumping logs:"
              docker logs --tail 50 hydroflow-api-demo 2>&1
              exit 1
            fi

            # Push schema to DB and re-seed
            docker compose -p hydroflow-demo -f docker/docker-compose.demo.yml --env-file /opt/hydroflow/.env.demo exec -T backend bunx prisma db push --accept-data-loss || { echo "Prisma push failed"; exit 1; }
            docker compose -p hydroflow-demo -f docker/docker-compose.demo.yml --env-file /opt/hydroflow/.env.demo exec -T backend bun run prisma/seed.ts || { echo "Seed failed"; exit 1; }

            # Recreate nginx so it picks up config changes (git reset creates new inodes)
            docker compose -p hydroflow-nginx -f docker/docker-compose.nginx.yml up -d --force-recreate

            # Reload nginx to re-resolve DNS for new container IPs
            docker exec hydroflow-nginx nginx -s reload

            # Cleanup
            docker image prune -f

            echo "Deploy to Demo successful!"
            exit 0
