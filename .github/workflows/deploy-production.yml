# .github/workflows/deploy-production.yml
name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production # Requires manual approval (optional)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/hydroflow/hydroflow

            # Pull latest code (reset local changes from manual edits)
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            # Ensure shared proxy network exists
            docker network create hydroflow-proxy 2>/dev/null || true

            # Build and deploy production
            # up -d may report exit 137 from old containers being killed during recreation — ignore and verify
            docker compose -p hydroflow-prod -f docker/docker-compose.prod.yml --env-file /opt/hydroflow/.env.prod up -d --build || true

            # Verify all containers are running
            docker compose -p hydroflow-prod -f docker/docker-compose.prod.yml ps --format '{{.Service}} {{.State}}' | while read svc state; do
              if [ "$state" != "running" ]; then
                echo "❌ Service $svc is $state, not running"
                exit 1
              fi
            done

            # Run database migrations
            docker compose -p hydroflow-prod -f docker/docker-compose.prod.yml exec -T backend bunx prisma migrate deploy

            # Recreate nginx so it picks up config changes (git reset creates new inodes)
            docker compose -p hydroflow-nginx -f docker/docker-compose.nginx.yml up -d --force-recreate

            # Reload nginx to re-resolve DNS for new container IPs
            docker exec hydroflow-nginx nginx -s reload

            # Cleanup
            docker image prune -f

            echo "✅ Production deployed successfully!"
