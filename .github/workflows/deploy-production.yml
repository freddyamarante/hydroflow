# .github/workflows/deploy-production.yml
name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production # Requires manual approval (optional)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd /opt/hydroflow/hydroflow

            # Pull latest code
            git fetch origin main
            git checkout main
            git pull origin main

            # Ensure shared proxy network exists
            docker network create hydroflow-proxy 2>/dev/null || true

            # Build and deploy production
            docker compose -f docker/docker-compose.prod.yml --env-file /opt/hydroflow/.env.prod up -d --build

            # Run database migrations
            docker compose -f docker/docker-compose.prod.yml exec -T backend bunx prisma migrate deploy

            # Cleanup
            docker image prune -f

            echo "✅ Production deployed successfully!"
