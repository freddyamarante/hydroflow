# .github/workflows/deploy-production.yml
name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production # Requires manual approval (optional)

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd /opt/hydroflow/hydroflow

            # Pull latest code (reset local changes from manual edits)
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            # Ensure shared proxy network exists
            docker network create hydroflow-proxy 2>/dev/null || true

            # Build and deploy production (old containers exiting with 137 is expected)
            docker compose -p hydroflow-prod -f docker/docker-compose.prod.yml --env-file /opt/hydroflow/.env.prod build || { echo "❌ Build failed"; exit 1; }
            docker compose -p hydroflow-prod -f docker/docker-compose.prod.yml --env-file /opt/hydroflow/.env.prod up -d

            # Wait for containers to settle
            sleep 5

            # Run database migrations
            docker compose -p hydroflow-prod -f docker/docker-compose.prod.yml --env-file /opt/hydroflow/.env.prod exec -T backend bunx prisma migrate deploy || { echo "❌ Migration failed"; exit 1; }

            # Recreate nginx so it picks up config changes (git reset creates new inodes)
            docker compose -p hydroflow-nginx -f docker/docker-compose.nginx.yml up -d --force-recreate

            # Reload nginx to re-resolve DNS for new container IPs
            docker exec hydroflow-nginx nginx -s reload

            # Cleanup
            docker image prune -f

            echo "✅ Production deployed successfully!"
            exit 0
