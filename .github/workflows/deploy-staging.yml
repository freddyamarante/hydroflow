# .github/workflows/deploy-staging.yml
name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/hydroflow/hydroflow

            # Pull latest code
            git fetch origin staging
            git checkout staging
            git pull origin staging

            # Ensure shared proxy network exists
            docker network create hydroflow-proxy 2>/dev/null || true

            # Build and deploy staging services
            docker compose -f docker/docker-compose.staging.yml --env-file /opt/hydroflow/.env.staging up -d --build

            # Run database migrations
            docker compose -f docker/docker-compose.staging.yml exec -T backend bunx prisma migrate deploy

            # Restart prod nginx so it can route staging subdomains
            docker compose -f docker/docker-compose.prod.yml --env-file /opt/hydroflow/.env.prod up -d nginx

            # Cleanup
            docker image prune -f

            echo "✅ Staging deployed successfully!"
