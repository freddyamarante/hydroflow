# .github/workflows/deploy-staging.yml
name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Wait for server to be ready
        run: |
          for i in 1 2 3 4 5; do
            nc -z -w 5 ${{ secrets.SERVER_HOST }} 22 && echo "SSH port open" && exit 0
            echo "Attempt $i: SSH port not ready, waiting 30s..."
            sleep 30
          done
          echo "SSH port not reachable after 5 attempts"
          exit 1

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            # Free disk space before anything else
            docker system prune -af
            docker builder prune -af

            cd /opt/hydroflow/hydroflow

            # Pull latest code (reset local changes from manual edits)
            git fetch origin staging
            git checkout staging
            git reset --hard origin/staging

            # Ensure shared proxy network exists
            docker network create hydroflow-proxy 2>/dev/null || true

            # Build staging services (fail on build error)
            docker compose -p hydroflow-staging -f docker/docker-compose.staging.yml --env-file /opt/hydroflow/.env.staging build || { echo "Build failed"; exit 1; }

            # Step 1: Start only postgres and wait for it to be healthy
            docker compose -p hydroflow-staging -f docker/docker-compose.staging.yml --env-file /opt/hydroflow/.env.staging up -d postgres
            echo "Waiting for postgres to be healthy..."
            for i in $(seq 1 30); do
              HEALTH=$(docker inspect --format '{{.State.Health.Status}}' hydroflow-db-staging 2>/dev/null || echo "missing")
              if [ "$HEALTH" = "healthy" ]; then
                echo "Postgres is healthy (attempt $i)"
                break
              fi
              echo "  Attempt $i: postgres is $HEALTH, waiting..."
              sleep 3
            done

            # Step 2: Push schema to DB BEFORE starting the backend
            docker compose -p hydroflow-staging -f docker/docker-compose.staging.yml --env-file /opt/hydroflow/.env.staging run --rm -T backend bunx prisma db push --accept-data-loss || { echo "Prisma push failed"; exit 1; }

            # Step 3: Seed the database
            docker compose -p hydroflow-staging -f docker/docker-compose.staging.yml --env-file /opt/hydroflow/.env.staging run --rm -T backend bun run prisma/seed.ts || { echo "Seed failed"; exit 1; }

            # Step 4: Now start all services (backend will find tables ready)
            docker compose -p hydroflow-staging -f docker/docker-compose.staging.yml --env-file /opt/hydroflow/.env.staging up -d

            # Wait for backend to stabilize
            echo "Waiting for backend container to be running..."
            for i in $(seq 1 15); do
              STATE=$(docker inspect --format '{{.State.Status}}' hydroflow-api-staging 2>/dev/null || echo "missing")
              if [ "$STATE" = "running" ]; then
                echo "Backend container is running (attempt $i)"
                sleep 3
                STATE=$(docker inspect --format '{{.State.Status}}' hydroflow-api-staging 2>/dev/null || echo "missing")
                if [ "$STATE" = "running" ]; then
                  echo "Backend is stable"
                  break
                fi
              fi
              echo "  Attempt $i: backend is $STATE, waiting..."
              sleep 3
            done

            STATE=$(docker inspect --format '{{.State.Status}}' hydroflow-api-staging 2>/dev/null || echo "missing")
            if [ "$STATE" != "running" ]; then
              echo "Backend container is $STATE — dumping logs:"
              docker logs --tail 50 hydroflow-api-staging 2>&1
              exit 1
            fi

            # Recreate nginx so it picks up config changes (git reset creates new inodes)
            docker compose -p hydroflow-nginx -f docker/docker-compose.nginx.yml up -d --force-recreate

            # Reload nginx to re-resolve DNS for new container IPs
            docker exec hydroflow-nginx nginx -s reload

            # Cleanup
            docker image prune -f

            echo "Staging deployed successfully!"
            exit 0
