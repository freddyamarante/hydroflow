# .github/workflows/deploy-staging.yml
name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/hydroflow/hydroflow

            # Pull latest code (reset local changes from manual edits)
            git fetch origin staging
            git checkout staging
            git reset --hard origin/staging

            # Ensure shared proxy network exists
            docker network create hydroflow-proxy 2>/dev/null || true

            # Build and deploy staging services (no-cache to ensure fresh build)
            docker compose -p hydroflow-staging -f docker/docker-compose.staging.yml --env-file /opt/hydroflow/.env.staging build --no-cache
            docker compose -p hydroflow-staging -f docker/docker-compose.staging.yml --env-file /opt/hydroflow/.env.staging up -d

            # Run database migrations and seed
            docker compose -p hydroflow-staging -f docker/docker-compose.staging.yml exec -T backend bunx prisma migrate deploy
            docker compose -p hydroflow-staging -f docker/docker-compose.staging.yml exec -T backend bun run prisma/seed.ts

            # Recreate nginx so it picks up config changes (git reset creates new inodes)
            docker compose -p hydroflow-nginx -f docker/docker-compose.nginx.yml up -d --force-recreate

            # Reload nginx to re-resolve DNS for new container IPs
            docker exec hydroflow-nginx nginx -s reload

            # Cleanup
            docker image prune -f

            echo "✅ Staging deployed successfully!"
